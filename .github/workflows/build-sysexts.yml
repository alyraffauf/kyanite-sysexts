---
name: Build sysexts
on:
    push:
        branches:
            - main
    schedule:
        - cron: '0 6 * * 0'  # weekly Sunday 06:00 UTC, picks up upstream kyanite drift
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build:
        name: Build ${{ matrix.name }} sysext
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                name: [docker, rocm, steam, syncthing, virt]
        concurrency:
            group: sysexts-${{ matrix.name }}
            cancel-in-progress: false
        container:
            image: registry.fedoraproject.org/fedora:44
            options: --privileged
            volumes:
                - /tmp:/var/tmp
        env:
            NAME: ${{ matrix.name }}
            ARCH: x86-64
            VERSION: ${{ github.run_number }}
            KEEP_VERSIONS: 3
            GH_REPO: ${{ github.repository }}
            GH_TOKEN: ${{ github.token }}
        steps:
            - uses: actions/checkout@v4

            - name: Install build deps
              run: |
                  dnf install -y --setopt=install_weak_deps=False \
                      mkosi squashfs-tools libseccomp \
                      libselinux-utils selinux-policy-targeted \
                      dnf-plugins-core distribution-gpg-keys \
                      gh

            - name: Build sysext
              run: bash build.sh "$NAME"

            - name: Stage release artifacts
              run: |
                  cd output
                  ASSET="${NAME}-${VERSION}-${ARCH}.raw"
                  RAW_RE="${NAME}-[0-9]+-${ARCH}\\.raw"
                  mv "${NAME}.raw" "$ASSET"
                  cp "../sysupdate.d/${NAME}.transfer" .

                  # Cumulative SHA256SUMS; newest wins on filename collision.
                  if gh release view "sysext-${NAME}" >/dev/null 2>&1; then
                      gh release download "sysext-${NAME}" --pattern SHA256SUMS --output prev.sums
                  else
                      : > prev.sums
                  fi
                  sha256sum "$ASSET" "${NAME}.transfer" > new.sums
                  cat new.sums prev.sums | awk '!seen[$2]++' | sort -k2 > all.sums
                  rm new.sums prev.sums

                  # Keep last N raw versions plus everything else (e.g. .transfer).
                  {
                      grep -vE "  ${RAW_RE}$" all.sums
                      grep -E "  ${RAW_RE}$" all.sums | sort -V -k2 | tail -n "$KEEP_VERSIONS"
                  } | sort -k2 > SHA256SUMS
                  rm all.sums

            - name: Publish to rolling release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: sysext-${{ env.NAME }}
                  name: sysext-${{ env.NAME }}
                  files: |
                      output/${{ env.NAME }}-${{ env.VERSION }}-${{ env.ARCH }}.raw
                      output/${{ env.NAME }}.transfer
                      output/SHA256SUMS
                  body: |
                      Rolling release for the **${{ env.NAME }}** sysext.

                      Latest build: `${{ env.VERSION }}` (${{ env.ARCH }})

                      Install via `ujust install-sysext ${{ env.NAME }}` on kyanite-dx.

            - name: Prune assets dropped from SHA256SUMS
              run: |
                  KEEP=$( { awk '{print $2}' output/SHA256SUMS; echo SHA256SUMS; } | sort -u)
                  gh release view "sysext-${NAME}" --json assets --jq '.assets[].name' \
                      | while read -r f; do
                          printf '%s\n' "$KEEP" | grep -qFx "$f" && continue
                          echo "Pruning $f"
                          gh release delete-asset "sysext-${NAME}" "$f" --yes
                      done
