---
name: Build sysexts
on:
    push:
        branches:
            - main
    schedule:
        - cron: '0 6 * * 0'  # weekly Sunday 06:00 UTC, picks up upstream kyanite drift
    workflow_dispatch:

permissions:
    contents: write

jobs:
    select:
        name: Select sysexts to build
        runs-on: ubuntu-latest
        outputs:
            sysexts: ${{ steps.matrix.outputs.sysexts }}
        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 2

            # On schedule / manual / first-build: rebuild everything.
            # On push: build only sysexts whose own files changed; if shared
            # build infra changed (build.sh, base/, the workflow), rebuild all.
            - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
              if: github.event_name == 'push'
              id: changes
              with:
                  list-files: none
                  filters: |
                      docker:
                        - 'docker/**'
                        - 'sysupdate.d/docker.transfer'
                      rocm:
                        - 'rocm/**'
                        - 'sysupdate.d/rocm.transfer'
                      steam:
                        - 'steam/**'
                        - 'sysupdate.d/steam.transfer'
                      syncthing:
                        - 'syncthing/**'
                        - 'sysupdate.d/syncthing.transfer'
                      tailscale:
                        - 'tailscale/**'
                        - 'sysupdate.d/tailscale.transfer'
                      virt:
                        - 'virt/**'
                        - 'sysupdate.d/virt.transfer'
                      shared:
                        - 'build.sh'
                        - 'base/**'
                        - '.github/workflows/build-sysexts.yml'

            - id: matrix
              env:
                  ALL: '["docker","rocm","steam","syncthing","tailscale","virt"]'
                  CHANGES: ${{ steps.changes.outputs.changes }}
                  SHARED: ${{ steps.changes.outputs.shared }}
              run: |
                  if [[ "${{ github.event_name }}" != "push" || "$SHARED" == "true" ]]; then
                      echo "sysexts=$ALL" >>"$GITHUB_OUTPUT"
                  else
                      # Drop the synthetic 'shared' entry from the changed list.
                      filtered=$(echo "$CHANGES" | jq -c 'map(select(. != "shared"))')
                      echo "sysexts=$filtered" >>"$GITHUB_OUTPUT"
                  fi

    build:
        name: Build ${{ matrix.name }} sysext
        needs: select
        if: needs.select.outputs.sysexts != '[]'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                name: ${{ fromJson(needs.select.outputs.sysexts) }}
        concurrency:
            group: sysexts-${{ matrix.name }}
            cancel-in-progress: false
        container:
            image: registry.fedoraproject.org/fedora:44
            options: --privileged
            volumes:
                - /tmp:/var/tmp
        env:
            NAME: ${{ matrix.name }}
            ARCH: x86-64
            VERSION: ${{ github.run_number }}
            KEEP_VERSIONS: 3
            GH_REPO: ${{ github.repository }}
            GH_TOKEN: ${{ github.token }}
        steps:
            - uses: actions/checkout@v4

            - name: Install build deps
              run: |
                  dnf install -y --setopt=install_weak_deps=False \
                      mkosi squashfs-tools libseccomp \
                      libselinux-utils selinux-policy-targeted \
                      dnf-plugins-core distribution-gpg-keys \
                      gh

            - name: Build sysext
              run: bash build.sh "$NAME"

            - name: Stage release artifacts
              run: |
                  cd output
                  ASSET="${NAME}-${VERSION}-${ARCH}.raw"
                  RAW_RE="${NAME}-[0-9]+-${ARCH}\\.raw"
                  mv "${NAME}.raw" "$ASSET"
                  cp "../sysupdate.d/${NAME}.transfer" .

                  # Cumulative SHA256SUMS; newest wins on filename collision.
                  if gh release view "sysext-${NAME}" >/dev/null 2>&1; then
                      gh release download "sysext-${NAME}" --pattern SHA256SUMS --output prev.sums
                  else
                      : > prev.sums
                  fi
                  sha256sum "$ASSET" "${NAME}.transfer" > new.sums
                  cat new.sums prev.sums | awk '!seen[$2]++' | sort -k2 > all.sums
                  rm new.sums prev.sums

                  # Keep last N raw versions plus everything else (e.g. .transfer).
                  {
                      grep -vE "  ${RAW_RE}$" all.sums
                      grep -E "  ${RAW_RE}$" all.sums | sort -V -k2 | tail -n "$KEEP_VERSIONS"
                  } | sort -k2 > SHA256SUMS
                  rm all.sums

            - name: Publish to rolling release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: sysext-${{ env.NAME }}
                  name: sysext-${{ env.NAME }}
                  files: |
                      output/${{ env.NAME }}-${{ env.VERSION }}-${{ env.ARCH }}.raw
                      output/${{ env.NAME }}.transfer
                      output/SHA256SUMS
                  body: |
                      Rolling release for the **${{ env.NAME }}** sysext.

                      Latest build: `${{ env.VERSION }}` (${{ env.ARCH }})

                      Install via `ujust install-sysext ${{ env.NAME }}` on kyanite.

            - name: Prune assets dropped from SHA256SUMS
              run: |
                  KEEP=$( { awk '{print $2}' output/SHA256SUMS; echo SHA256SUMS; } | sort -u)
                  gh release view "sysext-${NAME}" --json assets --jq '.assets[].name' \
                      | while read -r f; do
                          printf '%s\n' "$KEEP" | grep -qFx "$f" && continue
                          echo "Pruning $f"
                          gh release delete-asset "sysext-${NAME}" "$f" --yes
                      done
